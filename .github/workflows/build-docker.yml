name: Build and Push Docker Image

on:
  push:
    branches:
      - develop
      - main
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  build-backend:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_name: ${{ steps.lowercase.outputs.image_name }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Convert to lowercase
        id: lowercase
        run: |
          echo "image_name=$(echo '${{ github.repository_owner }}/isrcanalytics-baserow' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ steps.lowercase.outputs.image_name }}-backend:${{ github.sha }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend
          target: production

  build-webfrontend:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_name: ${{ steps.lowercase.outputs.image_name }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Convert to lowercase
        id: lowercase
        run: |
          echo "image_name=$(echo '${{ github.repository_owner }}/isrcanalytics-baserow' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push web-frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./web-frontend
          file: ./web-frontend/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ steps.lowercase.outputs.image_name }}-webfrontend:${{ github.sha }}
          cache-from: type=gha,scope=webfrontend
          cache-to: type=gha,mode=max,scope=webfrontend
          target: production

  build-allinone:
    runs-on: ubuntu-latest
    needs: [build-backend, build-webfrontend]
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Convert to lowercase
        id: lowercase
        run: |
          echo "image_name=$(echo '${{ github.repository_owner }}/isrcanalytics-baserow' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ steps.lowercase.outputs.image_name }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/develop' }}

      - name: Build and push all-in-one image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./deploy/all-in-one/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=allinone
          cache-to: type=gha,mode=max,scope=allinone
          target: prod
          build-args: |
            BACKEND_IMAGE=${{ env.REGISTRY }}/${{ steps.lowercase.outputs.image_name }}-backend
            WEBFRONTEND_IMAGE=${{ env.REGISTRY }}/${{ steps.lowercase.outputs.image_name }}-webfrontend
          build-contexts: |
            backend_image=docker-image://${{ env.REGISTRY }}/${{ steps.lowercase.outputs.image_name }}-backend:${{ github.sha }}
            backend_image_dev=docker-image://${{ env.REGISTRY }}/${{ steps.lowercase.outputs.image_name }}-backend:${{ github.sha }}
            web_frontend_image=docker-image://${{ env.REGISTRY }}/${{ steps.lowercase.outputs.image_name }}-webfrontend:${{ github.sha }}
            web_frontend_image_dev=docker-image://${{ env.REGISTRY }}/${{ steps.lowercase.outputs.image_name }}-webfrontend:${{ github.sha }}
